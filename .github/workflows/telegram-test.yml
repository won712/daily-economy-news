name: Overseas economy briefing

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 07:30 Korea Standard Time is 22:30 UTC on the previous day.
    - cron: "30 22 * * *"

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send overseas economy briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
